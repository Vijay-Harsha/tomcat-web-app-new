apiVersion: apps/v1
kind: Deployment

metadata:
  name: tomcat-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: tomcat-app

  template:
    metadata:
      labels:
        app: tomcat-app

    spec:
      containers:
      - name: tomcat-container
        image: vjayht/tomcat-web-app:latest

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: tomcat-service

spec:
  type: NodePort

  selector:
    app: tomcat-app

  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30090
