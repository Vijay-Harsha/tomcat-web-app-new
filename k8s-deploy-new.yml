apiVersion: apps/v1
kind: Deployment

metadata:
  name: tomcat-deployment-new

spec:
  replicas: 2

  selector:
    matchLabels:
      app: tomcat-app-new

  template:
    metadata:
      labels:
        app: tomcat-app-new

    spec:
      containers:
      - name: tomcat-container-new
        image: vjayht/tomcat-web-app-new:latest

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: tomcat-service-new

spec:
  type: NodePort

  selector:
    app: tomcat-app-new

  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30089
